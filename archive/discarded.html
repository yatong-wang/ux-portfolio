<!-- Header styles with no border-bottom -->
<div class="space-y-4 mb-12">
    <span class="text-primary font-bold tracking-widest text-xs uppercase block mb-4">beyond work</span>
    <h2 class="text-4xl lg:text-5xl font-bold uppercase">what fuels me</h2>
</div>

<!-- Waving hand animation inline -->
<div class="absolute left-[50px] top-[50px] opacity-20 -rotate-12 group-hover:rotate-0 group-hover:opacity-30 group-hover:animate-bounce duration-500 pointer-events-none">
    <span class="material-symbols-outlined text-[#111714] text-[300px]">waving_hand</span>
</div>

<span class="material-symbols-outlined text-primary text-xl">mood</span>

<!-- Profile pic for testimonials -->
                        <div class="flex items-center gap-6">
                            <div class="h-12 w-12 md:h-14 md:w-14 rounded-full overflow-hidden border-2 border-primary/50 shrink-0">
                                <img alt="${escapeHTML(testimonial.author.image.alt)}" class="h-full w-full object-cover" src="${escapeHTML(testimonial.author.image.url)}">
                            </div>
                            <div>
                                <p class="font-bold text-white">${escapeHTML(testimonial.author.name)}</p>
                                <p class="text-sm text-gray-400 mt-1 ${testimonial.author.linkedin ? '' : 'whitespace-nowrap'}">${escapeHTML(testimonial.author.role)}</p>
                            </div>
                        </div>
