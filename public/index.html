<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#36e27b",

                        "xl": "3rem",

                    },

                    },

    </script>
    <script>
        // #region agent log
        (function() {
            const log = (msg, data) => {
                fetch('http://127.0.0.1:7242/ingest/e1a8b0d8-63de-4e90-b89f-977a6030ee70', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        location: 'index.html:script',
                        message: msg,
                        data: data || {},
                        timestamp: Date.now(),
                        sessionId: 'debug-session',
                        runId: 'run1'
                    })
                }).catch(() => {});
            };
            
            // Hypothesis A: Check if @supports query matches
            const supportsTimeline = CSS.supports('animation-timeline', 'view()');
            log('Hypothesis A: animation-timeline support', {supportsTimeline, userAgent: navigator.userAgent});
            
            // Hypothesis B: Check reveal-on-scroll elements state
            document.addEventListener('DOMContentLoaded', () => {
                const revealElements = document.querySelectorAll('.reveal-on-scroll');
                log('Hypothesis B: reveal-on-scroll elements found', {
                    count: revealElements.length,
                    firstElementStyles: revealElements[0] ? {
                        opacity: window.getComputedStyle(revealElements[0]).opacity,
                        transform: window.getComputedStyle(revealElements[0]).transform,
                        filter: window.getComputedStyle(revealElements[0]).filter,
                        display: window.getComputedStyle(revealElements[0]).display,
                        visibility: window.getComputedStyle(revealElements[0]).visibility,
                        zIndex: window.getComputedStyle(revealElements[0]).zIndex
                    } : null
                });
                
                // Hypothesis C: Check if animation is applied
                const firstReveal = revealElements[0];
                if (firstReveal) {
                    const computed = window.getComputedStyle(firstReveal);
                    log('Hypothesis C: Animation state', {
                        animationName: computed.animationName,
                        animationDuration: computed.animationDuration,
                        animationTimeline: computed.animationTimeline || 'not supported'
                    });
                }
                
                // Hypothesis D: Check CSS custom properties resolution
                if (firstReveal) {
                    const root = getComputedStyle(document.documentElement);
                    log('Hypothesis D: CSS custom properties', {
                        revealTranslate: root.getPropertyValue('--animation-reveal-translate'),
                        revealBlur: root.getPropertyValue('--animation-reveal-blur'),
                        primaryColor: root.getPropertyValue('--color-primary')
                    });
                }
                
                // Hypothesis E: Check stacking context
                if (firstReveal) {
                    const parent = firstReveal.parentElement;
                    log('Hypothesis E: Stacking context', {
                        parentZIndex: window.getComputedStyle(parent).zIndex,
                        parentPosition: window.getComputedStyle(parent).position,
                        elementZIndex: window.getComputedStyle(firstReveal).zIndex,
                        elementPosition: window.getComputedStyle(firstReveal).position
                    });
                }
                
                // Check if fallback should apply
                setTimeout(() => {
                    if (!supportsTimeline && revealElements.length > 0) {
                        log('Hypothesis B: Applying fallback manually', {action: 'adding revealed class'});
                        revealElements.forEach(el => el.classList.add('revealed'));
                    }
                }, 100);
            });
        })();
        // #endregion
    </script>
</head>
